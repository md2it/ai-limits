name: Desktop unsigned build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS unsigned app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build unsigned macOS app
        run: npm exec tauri -- build --bundles app

      - name: Ad-hoc sign macOS app bundle
        run: |
          codesign --force --deep --sign - "target/release/bundle/macos/AI Limits.app"
          codesign --verify --deep --strict --verbose=4 "target/release/bundle/macos/AI Limits.app"

      - name: Archive macOS app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "target/release/bundle/macos/AI Limits.app" "target/release/bundle/macos/AI Limits.app.zip"

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-limits-macos-app
          path: target/release/bundle/macos/AI Limits.app.zip
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows unsigned bundles
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build unsigned Windows bundles
        run: npm exec tauri -- build --bundles nsis,msi

      - name: Upload Windows unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-limits-windows-unsigned
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux unsigned bundles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build unsigned Linux bundles
        run: npm exec tauri -- build --bundles deb,appimage

      - name: Upload Linux unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-limits-linux-unsigned
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 14

  publish-unstable-release:
    name: Publish unstable desktop pre-release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
      - build-linux

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/raw

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          tag="desktop-unstable-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p release-assets/upload

          cp "release-assets/raw/ai-limits-macos-app/AI Limits.app.zip" \
            "release-assets/upload/AI-Limits-${tag}-macos-app.zip"

          windows_exe="$(find release-assets/raw/ai-limits-windows-unsigned -type f -name '*.exe' | head -n 1)"
          windows_msi="$(find release-assets/raw/ai-limits-windows-unsigned -type f -name '*.msi' | head -n 1)"
          linux_deb="$(find release-assets/raw/ai-limits-linux-unsigned -type f -name '*.deb' | head -n 1)"
          linux_appimage="$(find release-assets/raw/ai-limits-linux-unsigned -type f -name '*.AppImage' | head -n 1)"

          cp "$windows_exe" "release-assets/upload/AI-Limits-${tag}-windows-setup.exe"
          cp "$windows_msi" "release-assets/upload/AI-Limits-${tag}-windows.msi"
          cp "$linux_deb" "release-assets/upload/AI-Limits-${tag}-linux.deb"
          cp "$linux_appimage" "release-assets/upload/AI-Limits-${tag}-linux.AppImage"

          {
            echo "tag=${tag}"
            echo "title=AI Limits desktop unstable ${tag}"
          } >> "$GITHUB_ENV"

      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "$tag" release-assets/upload/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$title" \
            --notes "Unstable desktop build. Working preview for testing and early use. Unsigned; macOS and Windows may show security warnings." \
            --prerelease
