name: Desktop build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag, for example v0.1.0
        required: true
        type: string
      macos_notarization:
        description: macOS notarization mode (full is default for releases)
        required: true
        default: full
        type: choice
        options:
          - sign-only
          - submit-only
          - full

permissions:
  contents: write

concurrency:
  group: desktop-release
  cancel-in-progress: false

jobs:
  validate-release-version:
    name: Validate release version
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release input and changelog
        env:
          RELEASE_TAG: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Releases must be started from the main branch." >&2
            exit 1
          fi

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must match vMAJOR.MINOR.PATCH, for example v0.1.0." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          text = Path("CHANGELOG.md").read_text()
          tag = os.environ["RELEASE_TAG"]
          if re.search(rf"^## \[{re.escape(tag)}\]", text, re.MULTILINE):
              raise SystemExit(f"CHANGELOG.md already contains a section for {tag}.")
          matches = list(re.finditer(r"^## Unreleased\s*$", text, re.MULTILINE))
          if len(matches) != 1:
              raise SystemExit("CHANGELOG.md must contain exactly one '## Unreleased' section.")
          next_section = re.search(r"^## ", text[matches[0].end():], re.MULTILINE)
          if next_section is None:
              raise SystemExit("CHANGELOG.md must contain a version section after '## Unreleased'.")
          body = text[matches[0].end():matches[0].end() + next_section.start()].strip()
          if not body:
              raise SystemExit("The '## Unreleased' section in CHANGELOG.md is empty.")
          PY

  build-macos:
    name: Build macOS signed app
    runs-on: macos-latest
    needs: validate-release-version
    env:
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Import code signing certificate
        run: |
          set -euo pipefail

          if [[ -z "$APPLE_CERTIFICATE" ]]; then
            echo "Missing secret: APPLE_CERTIFICATE" >&2
            exit 1
          fi

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychain -d user -s build.keychain login.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Install App Store Connect API key
        if: inputs.macos_notarization != 'sign-only'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_API_KEY_ID:-}" || -z "${APPLE_API_KEY_CONTENT:-}" || -z "${APPLE_API_ISSUER:-}" ]]; then
            echo "Missing secrets: APPLE_API_KEY_ID, APPLE_API_KEY_CONTENT, and/or APPLE_API_ISSUER" >&2
            exit 1
          fi

          mkdir -p "$HOME/.private_keys"
          printf '%s\n' "$APPLE_API_KEY_CONTENT" > "$HOME/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          {
            echo "APPLE_API_KEY_PATH=$HOME/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
            echo "APPLE_API_KEY=${APPLE_API_KEY_ID}"
            echo "APPLE_API_ISSUER=${APPLE_API_ISSUER}"
          } >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci

      - name: Build macOS app
        run: |
          set -euo pipefail
          unset APPLE_SIGNING_IDENTITY

          BUILD_ARGS=(--bundles app --target universal-apple-darwin)
          if [[ "${{ inputs.macos_notarization }}" == "submit-only" ]]; then
            BUILD_ARGS+=(--skip-stapling)
          fi

          npm exec tauri -- build "${BUILD_ARGS[@]}"

      - name: Verify macOS app signing and notarization
        run: |
          set -euo pipefail
          scripts/verify-macos-app.sh \
            --notarization "${{ inputs.macos_notarization }}" \
            "target/universal-apple-darwin/release/bundle/macos/AI Limits.app"

      - name: Archive macOS app bundle
        run: |
          set -euo pipefail

          APP_PATH="target/universal-apple-darwin/release/bundle/macos/AI Limits.app"
          ZIP_PATH="target/release/bundle/macos/AI Limits.app.zip"

          mkdir -p "$(dirname "$ZIP_PATH")"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Verify macOS release artifact round-trip
        run: |
          set -euo pipefail
          scripts/verify-macos-app.sh \
            --notarization "${{ inputs.macos_notarization }}" \
            "target/release/bundle/macos/AI Limits.app.zip"

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-limits-macos-app
          path: target/release/bundle/macos/AI Limits.app.zip
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows unsigned bundles
    runs-on: windows-latest
    needs: validate-release-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build unsigned Windows bundles
        run: npm exec tauri -- build --bundles nsis,msi

      - name: Upload Windows unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-limits-windows-unsigned
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux unsigned bundles
    runs-on: ubuntu-latest
    needs: validate-release-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build unsigned Linux bundles
        run: npm exec tauri -- build --bundles deb,appimage

      - name: Upload Linux unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-limits-linux-unsigned
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 14

  publish-unstable-release:
    name: Publish unstable desktop pre-release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
      - build-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/raw

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ inputs.version }}"
          mkdir -p release-assets/upload

          cp "release-assets/raw/ai-limits-macos-app/AI Limits.app.zip" \
            "release-assets/upload/AI-Limits-${tag}-macos-app.zip"

          windows_exe="$(find release-assets/raw/ai-limits-windows-unsigned -type f -name '*.exe' | head -n 1)"
          windows_msi="$(find release-assets/raw/ai-limits-windows-unsigned -type f -name '*.msi' | head -n 1)"
          linux_deb="$(find release-assets/raw/ai-limits-linux-unsigned -type f -name '*.deb' | head -n 1)"
          linux_appimage="$(find release-assets/raw/ai-limits-linux-unsigned -type f -name '*.AppImage' | head -n 1)"

          cp "$windows_exe" "release-assets/upload/AI-Limits-${tag}-windows-setup.exe"
          cp "$windows_msi" "release-assets/upload/AI-Limits-${tag}-windows.msi"
          cp "$linux_deb" "release-assets/upload/AI-Limits-${tag}-linux.deb"
          cp "$linux_appimage" "release-assets/upload/AI-Limits-${tag}-linux.AppImage"

          {
            echo "tag=${tag}"
            echo "title=AI Limits ${tag}"
            echo "macos_notarization=${{ inputs.macos_notarization }}"
          } >> "$GITHUB_ENV"

      - name: Finalize changelog and create tag
        env:
          RELEASE_TAG: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main:refs/remotes/origin/main --tags
          remote_main="$(git rev-parse origin/main)"
          if [[ "$remote_main" != "$GITHUB_SHA" ]]; then
            echo "The main branch changed after this workflow started. Start a new release workflow from the current main branch." >&2
            exit 1
          fi

          python3 - <<'PY'
          from datetime import date
          from pathlib import Path
          import os
          import re

          path = Path("CHANGELOG.md")
          text = path.read_text()
          tag = os.environ["RELEASE_TAG"]
          repository = os.environ["GITHUB_REPOSITORY"]
          if re.search(rf"^## \[{re.escape(tag)}\]", text, re.MULTILINE):
              raise SystemExit(f"CHANGELOG.md already contains a section for {tag}.")
          matches = list(re.finditer(r"^## Unreleased\s*$", text, re.MULTILINE))
          if len(matches) != 1:
              raise SystemExit("CHANGELOG.md must contain exactly one '## Unreleased' section.")
          unreleased = matches[0]
          next_section = re.search(r"^## ", text[unreleased.end():], re.MULTILINE)
          if next_section is None:
              raise SystemExit("CHANGELOG.md must contain a version section after '## Unreleased'.")
          next_start = unreleased.end() + next_section.start()
          changes = text[unreleased.end():next_start].strip()
          if not changes:
              raise SystemExit("The '## Unreleased' section in CHANGELOG.md is empty.")
          release_heading = f"## [{tag}](https://github.com/{repository}/releases/tag/{tag}) — {date.today().isoformat()}"
          updated = text[:unreleased.start()] + "## Unreleased\n\n" + release_heading + "\n\n" + changes + "\n\n" + text[next_start:]
          path.write_text(updated)
          Path("release-changes.md").write_text(changes + "\n")
          Path("tag-notes.md").write_text(f"AI Limits {tag}\n\n{changes}\n")
          PY

          case "$macos_notarization" in
            full)
              macos_note="macOS: signed, notarized, and stapled."
              ;;
            submit-only)
              macos_note="macOS: signed; notarization submitted without waiting (may still be In Progress at Apple)."
              ;;
            *)
              macos_note="macOS: signed only (not notarized)."
              ;;
          esac

          {
            cat release-changes.md
            echo
            echo "## Build"
            echo
            echo "Unstable desktop build. ${macos_note} Windows and Linux are unsigned."
          } > release-notes.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "Release $RELEASE_TAG"
          git tag -a "$RELEASE_TAG" -F tag-notes.md
          git push --atomic origin HEAD:refs/heads/main "refs/tags/$RELEASE_TAG"

      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "$tag" release-assets/upload/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$title" \
            --notes-file release-notes.md \
            --prerelease
