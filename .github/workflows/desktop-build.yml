name: Desktop unsigned build

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS unsigned app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build unsigned macOS app
        run: npm exec tauri -- build --bundles app

      - name: Archive macOS app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "target/release/bundle/macos/AI Limits.app" "target/release/bundle/macos/AI Limits.app.zip"

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-limits-macos-app
          path: target/release/bundle/macos/AI Limits.app.zip
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows unsigned bundles
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build unsigned Windows bundles
        run: npm exec tauri -- build --bundles nsis,msi

      - name: Upload Windows unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-limits-windows-unsigned
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux unsigned bundles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build unsigned Linux bundles
        run: npm exec tauri -- build --bundles deb,appimage

      - name: Upload Linux unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-limits-linux-unsigned
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 14
