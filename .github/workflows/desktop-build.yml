name: Desktop build

on:
  workflow_dispatch:
    inputs:
      macos_notarization:
        description: macOS notarization mode (full is default for releases)
        required: true
        default: full
        type: choice
        options:
          - sign-only
          - submit-only
          - full

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS signed app
    runs-on: macos-latest
    env:
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Import code signing certificate
        run: |
          set -euo pipefail

          if [[ -z "$APPLE_CERTIFICATE" ]]; then
            echo "Missing secret: APPLE_CERTIFICATE" >&2
            exit 1
          fi

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychain -d user -s build.keychain login.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Install App Store Connect API key
        if: inputs.macos_notarization != 'sign-only'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_API_KEY_ID:-}" || -z "${APPLE_API_KEY_CONTENT:-}" || -z "${APPLE_API_ISSUER:-}" ]]; then
            echo "Missing secrets: APPLE_API_KEY_ID, APPLE_API_KEY_CONTENT, and/or APPLE_API_ISSUER" >&2
            exit 1
          fi

          mkdir -p "$HOME/.private_keys"
          printf '%s\n' "$APPLE_API_KEY_CONTENT" > "$HOME/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          {
            echo "APPLE_API_KEY_PATH=$HOME/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
            echo "APPLE_API_KEY=${APPLE_API_KEY_ID}"
            echo "APPLE_API_ISSUER=${APPLE_API_ISSUER}"
          } >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci

      - name: Build macOS app
        run: |
          set -euo pipefail
          unset APPLE_SIGNING_IDENTITY

          BUILD_ARGS=(--bundles app --target universal-apple-darwin)
          if [[ "${{ inputs.macos_notarization }}" == "submit-only" ]]; then
            BUILD_ARGS+=(--skip-stapling)
          fi

          npm exec tauri -- build "${BUILD_ARGS[@]}"

      - name: Archive macOS app bundle
        run: |
          set -euo pipefail

          APP_PATH="target/universal-apple-darwin/release/bundle/macos/AI Limits.app"
          ZIP_PATH="target/release/bundle/macos/AI Limits.app.zip"
          NOTARIZATION_MODE="${{ inputs.macos_notarization }}"

          codesign --verify --deep --strict --verbose=4 "$APP_PATH"

          if [[ "$NOTARIZATION_MODE" == "full" ]]; then
            stapler validate "$APP_PATH"
          elif [[ "$NOTARIZATION_MODE" == "submit-only" ]]; then
            echo "Notarization submitted without waiting. Check status with:"
            echo "  xcrun notarytool history --key ... --key-id ... --issuer ..."
            echo "After Accepted, staple locally or rerun workflow with macos_notarization=full:"
            echo "  xcrun stapler staple \"$APP_PATH\""
          else
            echo "Signed only. Gatekeeper may warn until the app is notarized."
          fi

          mkdir -p "$(dirname "$ZIP_PATH")"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-limits-macos-app
          path: target/release/bundle/macos/AI Limits.app.zip
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows unsigned bundles
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build unsigned Windows bundles
        run: npm exec tauri -- build --bundles nsis,msi

      - name: Upload Windows unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-limits-windows-unsigned
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux unsigned bundles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build unsigned Linux bundles
        run: npm exec tauri -- build --bundles deb,appimage

      - name: Upload Linux unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-limits-linux-unsigned
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 14

  publish-unstable-release:
    name: Publish unstable desktop pre-release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
      - build-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/raw

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          tag="desktop-unstable-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p release-assets/upload

          cp "release-assets/raw/ai-limits-macos-app/AI Limits.app.zip" \
            "release-assets/upload/AI-Limits-${tag}-macos-app.zip"

          windows_exe="$(find release-assets/raw/ai-limits-windows-unsigned -type f -name '*.exe' | head -n 1)"
          windows_msi="$(find release-assets/raw/ai-limits-windows-unsigned -type f -name '*.msi' | head -n 1)"
          linux_deb="$(find release-assets/raw/ai-limits-linux-unsigned -type f -name '*.deb' | head -n 1)"
          linux_appimage="$(find release-assets/raw/ai-limits-linux-unsigned -type f -name '*.AppImage' | head -n 1)"

          cp "$windows_exe" "release-assets/upload/AI-Limits-${tag}-windows-setup.exe"
          cp "$windows_msi" "release-assets/upload/AI-Limits-${tag}-windows.msi"
          cp "$linux_deb" "release-assets/upload/AI-Limits-${tag}-linux.deb"
          cp "$linux_appimage" "release-assets/upload/AI-Limits-${tag}-linux.AppImage"

          release_id="${tag#desktop-unstable-}"

          {
            echo "tag=${tag}"
            echo "title=unstable desktop-${release_id}"
            echo "macos_notarization=${{ inputs.macos_notarization }}"
          } >> "$GITHUB_ENV"

      - name: Prepare release notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          previous_tag="$(gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 100 \
            --json tagName \
            --jq '[.[] | select(.tagName | startswith("desktop-unstable-"))][0].tagName // ""')"

          if [[ -n "$previous_tag" ]]; then
            range="${previous_tag}..${GITHUB_SHA}"
          else
            range="${GITHUB_SHA}"
          fi

          notes="$(git log --format=%s "$range" \
            | grep -E '^(feat|fix): ' \
            | sed -E 's/^(feat|fix): /- /' || true)"

          if [[ -z "$notes" ]]; then
            notes="- No user-facing feat/fix commits in this release."
          fi

          case "$macos_notarization" in
            full)
              macos_note="macOS: signed, notarized, and stapled."
              ;;
            submit-only)
              macos_note="macOS: signed; notarization submitted without waiting (may still be In Progress at Apple)."
              ;;
            *)
              macos_note="macOS: signed only (not notarized)."
              ;;
          esac

          {
            echo "## Changes"
            echo
            echo "$notes"
            echo
            echo "## Build"
            echo
            echo "Unstable desktop build. ${macos_note} Windows and Linux are unsigned."
          } > release-notes.md

      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "$tag" release-assets/upload/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$title" \
            --notes-file release-notes.md \
            --prerelease
