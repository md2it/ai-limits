<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Limits</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>AI Limits</h1>
      </header>

      <section class="app-toolbar" aria-label="Refresh controls">
        <p class="last-updated" id="last-updated">Last updated: —</p>
        <div class="toolbar-actions">
          <div class="settings-menu" id="settings-menu">
            <button
              type="button"
              class="settings-button"
              id="settings-button"
              aria-label="Settings"
              aria-haspopup="true"
              aria-expanded="false"
              aria-controls="settings-dropdown"
            >
              <svg
                class="settings-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
            <div class="settings-dropdown" id="settings-dropdown" hidden>
              <label class="settings-toggle">
                <span>Notifications</span>
                <input type="checkbox" id="setting-notifications" checked />
              </label>
              <label class="settings-toggle">
                <span>Cursor</span>
                <input type="checkbox" id="setting-cursor" checked />
              </label>
              <label class="settings-toggle">
                <span>Cloud</span>
                <input type="checkbox" id="setting-cloud" checked />
              </label>
              <label class="settings-toggle">
                <span>Codex</span>
                <input type="checkbox" id="setting-codex" checked />
              </label>
              <label class="settings-toggle">
                <span>Use CLI fallback</span>
                <input type="checkbox" id="setting-cli-fallback" />
              </label>
            </div>
          </div>
          <button type="button" class="refresh-button" id="refresh-button">Refresh</button>
        </div>
      </section>

      <section class="providers" aria-label="Provider limits" id="provider-list"></section>

      <section class="status-line" aria-live="polite" id="status-line">Loading provider limits...</section>
    </main>

    <script>
      const updateFrequencyOptions = [
        "Manual only",
        "1 min",
        "5 min",
        "10 min",
        "30 min",
        "1 hour",
      ];
      const DEFAULT_UPDATE_FREQUENCY = "5 min";
      const PROVIDER_STATUS_HIDE_MS = 4000;
      const SETTINGS_STORAGE_KEY = "ai-limits-settings";
      const PROVIDER_IDS = ["codex", "claude", "cursor"];

      const DEFAULT_APP_SETTINGS = {
        notifications: true,
        cursor: true,
        cloud: true,
        codex: true,
        useCliFallback: false,
      };

      const providerList = document.querySelector("#provider-list");
      const statusLine = document.querySelector("#status-line");
      const refreshButton = document.querySelector("#refresh-button");
      const lastUpdatedLine = document.querySelector("#last-updated");
      const settingsMenu = document.querySelector("#settings-menu");
      const settingsButton = document.querySelector("#settings-button");
      const settingsDropdown = document.querySelector("#settings-dropdown");
      const settingInputs = {
        notifications: document.querySelector("#setting-notifications"),
        cursor: document.querySelector("#setting-cursor"),
        cloud: document.querySelector("#setting-cloud"),
        codex: document.querySelector("#setting-codex"),
        useCliFallback: document.querySelector("#setting-cli-fallback"),
      };

      const providerRefreshIntervals = new Map();
      const providerRefreshTimers = new Map();
      const providerRefreshInFlight = new Set();
      const providerStatusHideTimers = new Map();

      let isRefreshing = false;
      let appSettings = loadAppSettings();

      function loadAppSettings() {
        try {
          const stored = localStorage.getItem(SETTINGS_STORAGE_KEY);
          if (!stored) {
            return { ...DEFAULT_APP_SETTINGS };
          }

          const parsed = JSON.parse(stored);
          return {
            notifications:
              typeof parsed.notifications === "boolean"
                ? parsed.notifications
                : DEFAULT_APP_SETTINGS.notifications,
            cursor:
              typeof parsed.cursor === "boolean" ? parsed.cursor : DEFAULT_APP_SETTINGS.cursor,
            cloud: typeof parsed.cloud === "boolean" ? parsed.cloud : DEFAULT_APP_SETTINGS.cloud,
            codex: typeof parsed.codex === "boolean" ? parsed.codex : DEFAULT_APP_SETTINGS.codex,
            useCliFallback:
              typeof parsed.useCliFallback === "boolean"
                ? parsed.useCliFallback
                : DEFAULT_APP_SETTINGS.useCliFallback,
          };
        } catch {
          return { ...DEFAULT_APP_SETTINGS };
        }
      }

      function saveAppSettings() {
        localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(appSettings));
      }

      function syncSettingsInputs() {
        settingInputs.notifications.checked = appSettings.notifications;
        settingInputs.cursor.checked = appSettings.cursor;
        settingInputs.cloud.checked = appSettings.cloud;
        settingInputs.codex.checked = appSettings.codex;
        settingInputs.useCliFallback.checked = appSettings.useCliFallback;
      }

      function settingsToQuery() {
        return {
          enabledCodex: appSettings.codex,
          enabledClaude: appSettings.cloud,
          enabledCursor: appSettings.cursor,
          useCliFallback: appSettings.useCliFallback,
          notificationsEnabled: appSettings.notifications,
        };
      }

      function isProviderEnabled(providerId) {
        switch (providerId) {
          case "codex":
            return appSettings.codex;
          case "claude":
            return appSettings.cloud;
          case "cursor":
            return appSettings.cursor;
          default:
            return false;
        }
      }

      function removeDisabledProviderBlocks() {
        for (const providerId of PROVIDER_IDS) {
          if (isProviderEnabled(providerId)) {
            continue;
          }

          stopProviderRefreshTimer(providerId);
          clearProviderStatusHideTimer(providerId);
          getProviderBlock(providerId)?.remove();
        }
      }

      function setSettingsMenuOpen(isOpen) {
        settingsDropdown.hidden = !isOpen;
        settingsButton.setAttribute("aria-expanded", String(isOpen));
      }

      function handleSettingsChange() {
        appSettings = {
          notifications: settingInputs.notifications.checked,
          cursor: settingInputs.cursor.checked,
          cloud: settingInputs.cloud.checked,
          codex: settingInputs.codex.checked,
          useCliFallback: settingInputs.useCliFallback.checked,
        };
        saveAppSettings();
        removeDisabledProviderBlocks();
      }

      function frequencyToMs(frequency) {
        switch (frequency) {
          case "1 min":
            return 60_000;
          case "5 min":
            return 300_000;
          case "10 min":
            return 600_000;
          case "30 min":
            return 1_800_000;
          case "1 hour":
            return 3_600_000;
          default:
            return null;
        }
      }

      function getProviderInterval(providerId) {
        return providerRefreshIntervals.get(providerId) ?? DEFAULT_UPDATE_FREQUENCY;
      }

      function ensureProviderInterval(providerId, fallbackFrequency) {
        if (!providerRefreshIntervals.has(providerId)) {
          const frequency = updateFrequencyOptions.includes(fallbackFrequency)
            ? fallbackFrequency
            : DEFAULT_UPDATE_FREQUENCY;
          providerRefreshIntervals.set(providerId, frequency);
        }
      }

      function stopProviderRefreshTimer(providerId) {
        const timerId = providerRefreshTimers.get(providerId);
        if (timerId == null) {
          return;
        }

        clearInterval(timerId);
        providerRefreshTimers.delete(providerId);
      }

      function restartProviderRefreshTimer(providerId) {
        stopProviderRefreshTimer(providerId);

        if (!isProviderEnabled(providerId)) {
          return;
        }

        const intervalMs = frequencyToMs(getProviderInterval(providerId));
        if (intervalMs == null) {
          return;
        }

        const timerId = setInterval(() => {
          refreshSingleProvider(providerId);
        }, intervalMs);
        providerRefreshTimers.set(providerId, timerId);
      }

      function setProviderInterval(providerId, frequency) {
        if (!updateFrequencyOptions.includes(frequency)) {
          return;
        }

        providerRefreshIntervals.set(providerId, frequency);
        restartProviderRefreshTimer(providerId);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function buildLimitRowsHtml(provider) {
        if (!provider.limits.length) {
          return `<p class="provider-message">${escapeHtml(provider.errorMessage || "No usable limit records from this source")}</p>`;
        }

        return provider.limits
          .map((limit) => {
            const percent = Number(limit.remainingPercentage).toFixed(1);
            const reset = limit.resetTime ? `<span>| reset ${escapeHtml(limit.resetTime)}</span>` : "";
            const width = Math.max(0, Math.min(100, Number(limit.remainingPercentage) || 0));

            return `
              <div class="limit-row">
                <span class="limit-name">${escapeHtml(limit.label)}</span>
                <div class="meter" aria-label="${escapeHtml(provider.label)} ${escapeHtml(limit.label)} ${percent}% left">
                  <span style="width: ${width}%"></span>
                </div>
                <span class="limit-value">${percent}% left</span>
                ${reset}
              </div>
            `;
          })
          .join("");
      }

      function renderProvider(provider) {
        const block = document.createElement("article");
        block.className = "provider-block";
        block.dataset.providerId = provider.id;

        const frequencyOptions = updateFrequencyOptions
          .map((option) => {
            const selected = option === getProviderInterval(provider.id) ? "selected" : "";
            return `<option ${selected}>${option}</option>`;
          })
          .join("");

        block.innerHTML = `
          <div class="provider-status" hidden aria-live="polite">
            <span class="provider-status-indicator" aria-hidden="true"></span>
            <span class="provider-status-text"></span>
          </div>
          <div class="provider-header">
            <h2>${escapeHtml(provider.label)}</h2>
          </div>
          <div class="limits">${buildLimitRowsHtml(provider)}</div>
          <p class="source-line">Source ${escapeHtml(provider.sourceId || "unknown")}: ${escapeHtml(provider.dataTimestamp || "unknown")}</p>
          <label class="frequency-row">
            <span>Update frequency</span>
            <select aria-label="${escapeHtml(provider.label)} update frequency">${frequencyOptions}</select>
          </label>
        `;

        return block;
      }

      function getProviderBlock(providerId) {
        return providerList.querySelector(`[data-provider-id="${providerId}"]`);
      }

      function clearProviderStatusHideTimer(providerId) {
        const timerId = providerStatusHideTimers.get(providerId);
        if (timerId == null) {
          return;
        }

        clearTimeout(timerId);
        providerStatusHideTimers.delete(providerId);
      }

      function hideProviderStatus(providerId) {
        const block = getProviderBlock(providerId);
        if (!block) {
          return;
        }

        const status = block.querySelector(".provider-status");
        status.hidden = true;
        status.classList.remove("loading", "updated", "failed");
        status.querySelector(".provider-status-text").textContent = "";
      }

      function scheduleHideProviderStatus(providerId) {
        clearProviderStatusHideTimer(providerId);

        const timerId = setTimeout(() => {
          providerStatusHideTimers.delete(providerId);
          hideProviderStatus(providerId);
        }, PROVIDER_STATUS_HIDE_MS);
        providerStatusHideTimers.set(providerId, timerId);
      }

      function setProviderStatus(providerId, statusType, statusText = "") {
        const block = getProviderBlock(providerId);
        if (!block) {
          return;
        }

        clearProviderStatusHideTimer(providerId);

        const status = block.querySelector(".provider-status");
        status.hidden = false;
        status.classList.remove("loading", "updated", "failed");
        status.classList.add(statusType);
        status.querySelector(".provider-status-text").textContent =
          statusText || (statusType === "loading" ? "Updating" : "");

        if (statusType === "updated" || statusType === "failed") {
          scheduleHideProviderStatus(providerId);
        }
      }

      function updateProviderBlockData(block, provider) {
        block.querySelector(".limits").innerHTML = buildLimitRowsHtml(provider);
        block.querySelector(".source-line").textContent =
          `Source ${provider.sourceId || "unknown"}: ${provider.dataTimestamp || "unknown"}`;
      }

      function isProviderRefreshSuccess(provider) {
        return !provider.errorMessage;
      }

      function attachProviderBlockHandlers(block, providerId) {
        const select = block.querySelector("select");
        select.value = getProviderInterval(providerId);
        select.addEventListener("change", (event) => {
          setProviderInterval(providerId, event.target.value);
        });
      }

      function mountProviderBlock(provider) {
        ensureProviderInterval(provider.id, provider.selectedUpdateFrequency);
        const block = renderProvider(provider);
        attachProviderBlockHandlers(block, provider.id);
        restartProviderRefreshTimer(provider.id);
        return block;
      }

      function replaceProviderBlock(provider) {
        const existingBlock = getProviderBlock(provider.id);
        const block = mountProviderBlock(provider);
        if (existingBlock) {
          existingBlock.replaceWith(block);
          return;
        }

        providerList.appendChild(block);
      }

      function formatLastUpdated(date) {
        return date.toLocaleString(undefined, {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function waitForNextPaint() {
        return new Promise((resolve) => {
          requestAnimationFrame(() => requestAnimationFrame(resolve));
        });
      }

      function setRefreshButtonState(refreshing) {
        refreshButton.disabled = refreshing;
        refreshButton.textContent = refreshing ? "Refreshing..." : "Refresh";
      }

      function setInitialLoadingState(loading) {
        statusLine.hidden = !loading;
        statusLine.classList.remove("error");
        statusLine.classList.toggle("loading", loading);
        statusLine.textContent = loading ? "Loading provider limits..." : "";
      }

      function setErrorState(message) {
        statusLine.hidden = false;
        statusLine.classList.remove("loading");
        statusLine.classList.add("error");
        statusLine.textContent = message;
      }

      function clearStatusState() {
        statusLine.textContent = "";
        statusLine.hidden = true;
        statusLine.classList.remove("loading", "error");
      }

      function setLastUpdated(date) {
        lastUpdatedLine.textContent = `Last updated: ${formatLastUpdated(date)}`;
      }

      async function fetchProviderLimits() {
        const invoke = window.__TAURI__?.core?.invoke;
        if (!invoke) {
          throw new Error("Tauri API is unavailable");
        }

        return invoke("get_provider_limits", { query: settingsToQuery() });
      }

      async function refreshSingleProvider(providerId) {
        if (!isProviderEnabled(providerId) || providerRefreshInFlight.has(providerId)) {
          return;
        }

        providerRefreshInFlight.add(providerId);

        try {
          const providers = await fetchProviderLimits();
          const provider = providers.find((entry) => entry.id === providerId);
          if (!provider) {
            return;
          }

          replaceProviderBlock(provider);
          setLastUpdated(new Date());
        } catch (error) {
          setErrorState(`Error loading provider limits: ${error.message || error}`);
        } finally {
          providerRefreshInFlight.delete(providerId);
        }
      }

      function applyProviderRefreshResults(providers) {
        for (const provider of providers) {
          let block = getProviderBlock(provider.id);
          if (!block) {
            block = mountProviderBlock(provider);
            providerList.appendChild(block);
          } else {
            updateProviderBlockData(block, provider);
          }

          if (isProviderRefreshSuccess(provider)) {
            setProviderStatus(provider.id, "updated", "Updated");
          } else {
            setProviderStatus(provider.id, "failed", "Failed");
          }
        }
      }

      async function refreshProviderLimits({ initial = false } = {}) {
        if (isRefreshing) {
          return;
        }

        removeDisabledProviderBlocks();

        const enabledProviders = PROVIDER_IDS.filter(isProviderEnabled);
        if (!enabledProviders.length) {
          providerList.replaceChildren();
          clearStatusState();
          setErrorState("Enable at least one provider in settings.");
          return;
        }

        isRefreshing = true;
        setRefreshButtonState(true);

        if (initial) {
          setInitialLoadingState(true);
        } else {
          for (const providerId of enabledProviders) {
            setProviderStatus(providerId, "loading");
          }
        }

        await waitForNextPaint();

        try {
          const providers = await fetchProviderLimits();

          removeDisabledProviderBlocks();

          if (initial) {
            providerList.replaceChildren(...providers.map((provider) => mountProviderBlock(provider)));
            clearStatusState();
          } else {
            applyProviderRefreshResults(providers);
          }

          if (providers.some(isProviderRefreshSuccess)) {
            setLastUpdated(new Date());
          }
        } catch (error) {
          if (initial) {
            setErrorState(`Error loading provider limits: ${error.message || error}`);
          } else {
            for (const providerId of enabledProviders) {
              setProviderStatus(providerId, "failed", "Failed");
            }
          }
        } finally {
          isRefreshing = false;
          setRefreshButtonState(false);
        }
      }

      settingsButton.addEventListener("click", (event) => {
        event.stopPropagation();
        setSettingsMenuOpen(settingsDropdown.hidden);
      });

      settingsDropdown.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      for (const input of Object.values(settingInputs)) {
        input.addEventListener("change", handleSettingsChange);
      }

      document.addEventListener("click", () => {
        setSettingsMenuOpen(false);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          setSettingsMenuOpen(false);
        }
      });

      syncSettingsInputs();
      refreshButton.addEventListener("click", () => {
        refreshProviderLimits();
      });
      refreshProviderLimits({ initial: true });
    </script>
  </body>
</html>
