<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Limits</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>AI Limits</h1>
      </header>

      <section class="app-toolbar" aria-label="Refresh controls">
        <p class="last-updated" id="last-updated">Last updated: —</p>
        <button type="button" class="refresh-button" id="refresh-button">Refresh</button>
      </section>

      <section class="settings" aria-label="Settings">
        <label class="toggle-row">
          <span>Notifications</span>
          <input type="checkbox" />
        </label>
      </section>

      <section class="providers" aria-label="Provider limits" id="provider-list"></section>

      <section class="status-line" aria-live="polite" id="status-line">Loading provider limits...</section>
    </main>

    <script>
      const updateFrequencyOptions = [
        "Manual only",
        "1 min",
        "5 min",
        "10 min",
        "30 min",
        "1 hour",
      ];
      const DEFAULT_UPDATE_FREQUENCY = "5 min";

      const providerList = document.querySelector("#provider-list");
      const statusLine = document.querySelector("#status-line");
      const refreshButton = document.querySelector("#refresh-button");
      const lastUpdatedLine = document.querySelector("#last-updated");

      const providerRefreshIntervals = new Map();
      const providerRefreshTimers = new Map();
      const providerRefreshInFlight = new Set();

      let isLoading = false;

      function frequencyToMs(frequency) {
        switch (frequency) {
          case "1 min":
            return 60_000;
          case "5 min":
            return 300_000;
          case "10 min":
            return 600_000;
          case "30 min":
            return 1_800_000;
          case "1 hour":
            return 3_600_000;
          default:
            return null;
        }
      }

      function getProviderInterval(providerId) {
        return providerRefreshIntervals.get(providerId) ?? DEFAULT_UPDATE_FREQUENCY;
      }

      function ensureProviderInterval(providerId, fallbackFrequency) {
        if (!providerRefreshIntervals.has(providerId)) {
          const frequency = updateFrequencyOptions.includes(fallbackFrequency)
            ? fallbackFrequency
            : DEFAULT_UPDATE_FREQUENCY;
          providerRefreshIntervals.set(providerId, frequency);
        }
      }

      function stopProviderRefreshTimer(providerId) {
        const timerId = providerRefreshTimers.get(providerId);
        if (timerId == null) {
          return;
        }

        clearInterval(timerId);
        providerRefreshTimers.delete(providerId);
      }

      function restartProviderRefreshTimer(providerId) {
        stopProviderRefreshTimer(providerId);

        const intervalMs = frequencyToMs(getProviderInterval(providerId));
        if (intervalMs == null) {
          return;
        }

        const timerId = setInterval(() => {
          refreshSingleProvider(providerId);
        }, intervalMs);
        providerRefreshTimers.set(providerId, timerId);
      }

      function setProviderInterval(providerId, frequency) {
        if (!updateFrequencyOptions.includes(frequency)) {
          return;
        }

        providerRefreshIntervals.set(providerId, frequency);
        restartProviderRefreshTimer(providerId);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderProvider(provider) {
        const block = document.createElement("article");
        block.className = "provider-block";
        block.dataset.providerId = provider.id;

        const limitRows = provider.limits.length
          ? provider.limits
          .map((limit) => {
            const percent = Number(limit.remainingPercentage).toFixed(1);
            const reset = limit.resetTime ? `<span>| reset ${escapeHtml(limit.resetTime)}</span>` : "";
            const width = Math.max(0, Math.min(100, Number(limit.remainingPercentage) || 0));

            return `
              <div class="limit-row">
                <span class="limit-name">${escapeHtml(limit.label)}</span>
                <div class="meter" aria-label="${escapeHtml(provider.label)} ${escapeHtml(limit.label)} ${percent}% left">
                  <span style="width: ${width}%"></span>
                </div>
                <span class="limit-value">${percent}% left</span>
                ${reset}
              </div>
            `;
          })
          .join("")
          : `<p class="provider-message">${escapeHtml(provider.errorMessage || "No usable limit records from this source")}</p>`;

        const frequencyOptions = updateFrequencyOptions
          .map((option) => {
            const selected = option === getProviderInterval(provider.id) ? "selected" : "";
            return `<option ${selected}>${option}</option>`;
          })
          .join("");

        block.innerHTML = `
          <h2>${escapeHtml(provider.label)}</h2>
          <div class="limits">${limitRows}</div>
          <p class="source-line">Source ${escapeHtml(provider.sourceId || "unknown")}: ${escapeHtml(provider.dataTimestamp || "unknown")}</p>
          <label class="frequency-row">
            <span>Update frequency</span>
            <select aria-label="${escapeHtml(provider.label)} update frequency">${frequencyOptions}</select>
          </label>
        `;

        return block;
      }

      function attachProviderBlockHandlers(block, providerId) {
        const select = block.querySelector("select");
        select.value = getProviderInterval(providerId);
        select.addEventListener("change", (event) => {
          setProviderInterval(providerId, event.target.value);
        });
      }

      function mountProviderBlock(provider) {
        ensureProviderInterval(provider.id, provider.selectedUpdateFrequency);
        const block = renderProvider(provider);
        attachProviderBlockHandlers(block, provider.id);
        restartProviderRefreshTimer(provider.id);
        return block;
      }

      function replaceProviderBlock(provider) {
        const existingBlock = providerList.querySelector(`[data-provider-id="${provider.id}"]`);
        const block = mountProviderBlock(provider);
        if (existingBlock) {
          existingBlock.replaceWith(block);
          return;
        }

        providerList.appendChild(block);
      }

      function formatLastUpdated(date) {
        return date.toLocaleString(undefined, {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function setLoadingState(loading) {
        isLoading = loading;
        refreshButton.disabled = loading;
        statusLine.hidden = !loading;
        statusLine.classList.remove("error");
        statusLine.classList.toggle("loading", loading);
        statusLine.textContent = loading ? "Loading provider limits..." : "";
      }

      function setErrorState(message) {
        statusLine.hidden = false;
        statusLine.classList.remove("loading");
        statusLine.classList.add("error");
        statusLine.textContent = message;
      }

      function clearStatusState() {
        statusLine.textContent = "";
        statusLine.hidden = true;
        statusLine.classList.remove("loading", "error");
      }

      function setLastUpdated(date) {
        lastUpdatedLine.textContent = `Last updated: ${formatLastUpdated(date)}`;
      }

      async function fetchProviderLimits() {
        const invoke = window.__TAURI__?.core?.invoke;
        if (!invoke) {
          throw new Error("Tauri API is unavailable");
        }

        return invoke("get_provider_limits");
      }

      async function refreshSingleProvider(providerId) {
        if (providerRefreshInFlight.has(providerId)) {
          return;
        }

        providerRefreshInFlight.add(providerId);

        try {
          const providers = await fetchProviderLimits();
          const provider = providers.find((entry) => entry.id === providerId);
          if (!provider) {
            return;
          }

          replaceProviderBlock(provider);
          setLastUpdated(new Date());
        } catch (error) {
          setErrorState(`Error loading provider limits: ${error.message || error}`);
        } finally {
          providerRefreshInFlight.delete(providerId);
        }
      }

      async function refreshProviderLimits() {
        if (isLoading) {
          return;
        }

        setLoadingState(true);

        try {
          const providers = await fetchProviderLimits();
          providerList.replaceChildren(...providers.map((provider) => mountProviderBlock(provider)));
          setLastUpdated(new Date());
          clearStatusState();
        } catch (error) {
          setErrorState(`Error loading provider limits: ${error.message || error}`);
        } finally {
          refreshButton.disabled = false;
          isLoading = false;
        }
      }

      refreshButton.addEventListener("click", refreshProviderLimits);
      refreshProviderLimits();
    </script>
  </body>
</html>
